services:
  - type: web
    name: voteblock-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://voteblock-frontend.onrender.com
    healthCheckPath: /api/health
  ...