services:
  - type: web
    name: voteblock-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://voteblock-frontend.onrender.com
    healthCheckPath: /api/health

  - type: web
    name: voteblock-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://voteblock-backend.onrender.com/api